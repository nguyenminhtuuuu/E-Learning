{%extends 'layout/base.html'%}
{%block content%}
<div class="d-flex align-items-center justify-content-between mt-4">
    <h3 class="text-success">Quản lý khóa học</h3>
    <a class="btn btn-info" href="/khoahoc_add">Thêm+</a>
</div>

{%for k, count in khoahoc%}
<div class="card mt-4 p-3">
    <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
            <div class="me-3 fs-4">📚</div>
            <div>
                <div class="fw-bold">{{ k.name }}</div>
                <small class="text-muted">
                    Số lượng người đăng ký: {{ count }}
                </small>
            </div>
        </div>

        <div class="d-flex align-items-center gap-2">
            <form action="/delete/{{k.id}}" method="post" style="margin:0;">
                <button class="btn btn-danger"
                        onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                    Xóa
                </button>
            </form>
            <a href="/" class="btn btn-success">Sửa</a>
        </div>
    </div>

    <div class="mt-3">
        {% for lesson in k.lessons %}
        <div class="d-flex align-items-center justify-content-between ms-4 border-top pt-2 mt-2">
            <div class="d-flex align-items-center">
                <div class="me-3 fs-5">📝</div>
                <div>
                    <small class="text-muted">Bài {{ loop.index }}</small>
                    <div class="fw-semibold">{{ lesson.title }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{%endfor%}
{%endblock%}
