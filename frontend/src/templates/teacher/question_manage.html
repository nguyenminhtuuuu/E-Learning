{%extends 'layout/base.html'%}
{%block content%}

<form action="/update_questions/{{lesson_id}}" method="post">
    <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
        <h4 class="fw-bold mb-0">Danh sách câu hỏi</h4>
    </div>
    <div class="d-flex flex-column gap-3">
        {% for q in questions %}

        <div class="card shadow-sm border-0">

            <div class="card-header d-flex justify-content-between">
                <span class="fw-semibold">❓ Câu {{loop.index}}</span>
                    <button class="btn btn-danger btn-sm"
        form="delete-form-{{q.id}}"
        onclick="return confirm('Bạn chắc chắn muốn xóa?')">
    Xóa
</button>
            </div>


            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nội dung câu hỏi</label>
                    <input class="form-control form-control-lg"
                           name="question_{{q.id}}"
                           value="{{q.content}}">
                </div>

                <div>
                    <label class="form-label fw-semibold mb-2">Đáp án</label>
                    <div class="d-flex flex-column gap-2">
                        {% for answer in q.answers %}
                        <label class="d-flex align-items-center gap-3 p-2 border rounded hover-answer">
                             <input type="radio" name="correct_{{q.id}}" value="{{answer.id}}" class="form-check-input"
                                    {% if answer.is_correct %}checked{% endif %}>
                            <input class="form-control border-0" name="answer_{{answer.id}}" value="{{answer.answer}}">
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="mt-4 d-flex justify-content-between">
        <a class="btn btn-primary" href="/question_add/{{lesson_id}}">Thêm câu hỏi</a>
        {%if questions%}
        <button class="btn btn-success">Lưu</button>
        {%endif%}
         <a class="btn btn-secondary" href="/khoahoc_manage">Quay lại</a>
    </div>
</form>
{% for q in questions %}
<form id="delete-form-{{q.id}}"
      action="/delete_question/{{q.id}}"
      method="post">
</form>
{% endfor %}
{%endblock%}
