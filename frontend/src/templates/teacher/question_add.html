{% extends 'layout/base.html' %}
{% block content %}

<form action="{{ url_for('add_question', lesson_id=lesson_id) }}" method="post">
    <div class="card mt-4 p-3">
        <div class="mb-3">
            <label class="fw-bold">❓ Nội dung câu hỏi</label>
            <input class="form-control" name="content" placeholder="Nhập câu hỏi..." required>
        </div>

        <div class="mt-3 ms-2 border-top pt-3">
            <div class="d-flex gap-3">
                <div class="fs-5">📝</div>

                <div class="flex-grow-1">
                    <div class="row mb-2">
                        <div class="col-9">
                            <input class="form-control" name="a1" placeholder="Đáp án A" required>
                        </div>
                        <div class="col-3 d-flex align-items-center">
                            <input name="correct" required type="radio" value="1">
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-9">
                            <input class="form-control" name="a2" placeholder="Đáp án B" required>
                        </div>
                        <div class="col-3 d-flex align-items-center">
                            <input name="correct" type="radio" value="2">
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="mt-3 d-flex justify-content-between">
            <button class="btn btn-info" type="submit">Thêm câu hỏi</button>
        </div>

    </div>
</form>

{% endblock %}
